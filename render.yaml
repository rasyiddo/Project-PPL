services:
  - type: web
    name: inventory-management-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --workers 2 --threads 4 --timeout 60"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-management-system
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.5"

databases:
  - name: inventory-management-system
    databaseName: inventory_w5ex
    user: inventory
    plan: free
